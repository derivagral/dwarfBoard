name: Fetch leaderboard snapshots

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/fetch-leaderboard.yml"
      - "etl/src/dwarfboard_etl/**"
      - "etl/pyproject.toml"
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "Leaderboard endpoint base URL override"
        required: false
        default: "http://loadbalancer-prod-1ac6c83-453346156.us-east-1.elb.amazonaws.com/leaderboards/scores/?"
      output_dir:
        description: "Where snapshots are written"
        required: false
        default: "etl/data/raw"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve fetch configuration
        id: config
        env:
          SECRET_LEADERBOARD_URL: ${{ secrets.LEADERBOARD_URL }}
        run: |
          DEFAULT_URL="http://loadbalancer-prod-1ac6c83-453346156.us-east-1.elb.amazonaws.com/leaderboards/scores/?"
          INPUT_URL="${{ github.event.inputs.url }}"
          INPUT_OUTPUT_DIR="${{ github.event.inputs.output_dir }}"

          URL="$INPUT_URL"
          if [ -z "$URL" ]; then
            URL="$SECRET_LEADERBOARD_URL"
          fi
          if [ -z "$URL" ]; then
            URL="$DEFAULT_URL"
          fi

          OUTPUT_DIR="$INPUT_OUTPUT_DIR"
          if [ -z "$OUTPUT_DIR" ]; then
            OUTPUT_DIR="etl/data/raw"
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Restore cached snapshots
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.config.outputs.output_dir }}
          key: snapshots-v1-${{ github.run_id }}
          restore-keys: |
            snapshots-v1-

      - name: Fetch all variant snapshots
        run: |
          BASE_URL="${{ steps.config.outputs.url }}"
          OUTPUT_DIR="${{ steps.config.outputs.output_dir }}"

          declare -A VARIANTS
          VARIANTS[solo]="fellowship=false&hardcore=false"
          VARIANTS[fellowship]="fellowship=true&hardcore=false"
          VARIANTS[hardcore_solo]="fellowship=false&hardcore=true"
          VARIANTS[hardcore_fellowship]="fellowship=true&hardcore=true"

          for variant in solo fellowship hardcore_solo hardcore_fellowship; do
            echo "--- Fetching $variant ---"
            PYTHONPATH=etl/src python -m dwarfboard_etl.cli fetch \
              --url "${BASE_URL}${VARIANTS[$variant]}" \
              --output-dir "${OUTPUT_DIR}/${variant}"
          done

      - name: Prune old snapshots (keep 7 days)
        run: |
          OUTPUT_DIR="${{ steps.config.outputs.output_dir }}"
          for dir in "$OUTPUT_DIR"/*/; do
            [ -d "$dir" ] || continue
            # Keep only the 1008 most recent snapshots per variant (7 days at 10-min intervals)
            ls -1t "$dir"leaderboard_*.json 2>/dev/null | tail -n +1009 | xargs -r rm --
            ls -1t "$dir"leaderboard_*.meta.json 2>/dev/null | tail -n +1009 | xargs -r rm --
          done

      - name: Prune snapshots from previous seasons
        run: |
          python3 -c "
          import json
          from pathlib import Path

          raw_dir = Path('${{ steps.config.outputs.output_dir }}')
          for variant_dir in sorted(raw_dir.iterdir()):
              if not variant_dir.is_dir():
                  continue
              snapshots = sorted(
                  p for p in variant_dir.glob('leaderboard_*.json')
                  if not p.name.endswith('.meta.json')
              )
              if not snapshots:
                  continue
              try:
                  current = json.loads(snapshots[-1].read_text()).get('seasonId')
              except Exception:
                  continue
              if not current:
                  continue
              pruned = 0
              for snap in snapshots[:-1]:
                  try:
                      sid = json.loads(snap.read_text()).get('seasonId')
                  except Exception:
                      continue
                  if sid and sid != current:
                      snap.unlink()
                      meta = snap.with_name(snap.stem + '.meta.json')
                      if meta.exists():
                          meta.unlink()
                      pruned += 1
              if pruned:
                  print(f'  [{variant_dir.name}] Pruned {pruned} snapshot(s) from season {sid} (current: {current})')
          "

      - name: Save snapshot cache
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.config.outputs.output_dir }}
          key: snapshots-v1-${{ github.run_id }}

      - name: Upload fetched artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-snapshots
          path: ${{ steps.config.outputs.output_dir }}/
          if-no-files-found: error
