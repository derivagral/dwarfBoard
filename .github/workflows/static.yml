name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'etl/**'
      - '.github/workflows/static.yml'
  workflow_run:
    workflows: ['Fetch leaderboard snapshots']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch + aggregate leaderboard payload
        run: |
          mkdir -p etl/data/raw client/public
          PYTHONPATH=etl/src python -m dwarfboard_etl.cli fetch --url "http://loadbalancer-prod-1ac6c83-453346156.us-east-1.elb.amazonaws.com/leaderboards/scores/?" --output-dir etl/data/raw
          PYTHONPATH=etl/src python -m dwarfboard_etl.cli leaderboard-aggregate --snapshots-dir etl/data/raw --output etl/data/leaderboard_metrics.csv --interval-minutes 10
          PYTHONPATH=etl/src python - <<'PY2'
import json
from pathlib import Path
from dwarfboard_etl.leaderboard import run_leaderboard_pipeline
rows = run_leaderboard_pipeline('etl/data/raw', 'etl/data/leaderboard_metrics.csv', interval_minutes=10)
Path('client/public/leaderboard.json').write_text(json.dumps(rows, indent=2), encoding='utf-8')
print(f'Wrote {len(rows)} rows to client/public/leaderboard.json')
PY2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Build site
        run: npm run build
        working-directory: client
      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
        working-directory: client
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
