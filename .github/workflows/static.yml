name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'etl/**'
      - '.github/workflows/static.yml'
  workflow_run:
    workflows: ['Fetch leaderboard snapshots']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch + aggregate leaderboard payload variants
        run: |
          mkdir -p client/public etl/data
          PYTHONPATH=etl/src python - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import urlencode

          from dwarfboard_etl.fetch import fetch_snapshot
          from dwarfboard_etl.leaderboard import run_leaderboard_pipeline

          base_url = 'http://loadbalancer-prod-1ac6c83-453346156.us-east-1.elb.amazonaws.com/leaderboards/scores/?'
          variants = {
              'solo': {'fellowship': 'false', 'hardcore': 'false'},
              'fellowship': {'fellowship': 'true', 'hardcore': 'false'},
              'hardcore_solo': {'fellowship': 'false', 'hardcore': 'true'},
              'hardcore_fellowship': {'fellowship': 'true', 'hardcore': 'true'},
          }

          payload = {'variants': {}}
          for key, query in variants.items():
              url = f"{base_url}{urlencode(query)}"
              out_dir = Path('etl/data/raw') / key
              fetch_snapshot(url, out_dir)
              rows = run_leaderboard_pipeline(out_dir, Path('etl/data') / f'leaderboard_{key}.csv', interval_minutes=10)
              payload['variants'][key] = rows

          Path('client/public/leaderboard.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          print('Wrote leaderboard payload variants to client/public/leaderboard.json')
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build site
        run: npm run build
        working-directory: client

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
        working-directory: client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
