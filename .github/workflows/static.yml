name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'etl/**'
      - '.github/workflows/static.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Snapshot data is now committed to the repo under etl/data/raw/,
      # so no artifact download step is needed.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate leaderboard payload
        run: PYTHONPATH=etl/src python etl/scripts/generate_pages_payload.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build site
        run: npm run build
        working-directory: client

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll
        working-directory: client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
